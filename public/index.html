<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anonymous Chat</title>
<style>
body { font-family: Arial, sans-serif; }
#messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; }
#messages img, #messages video, #messages audio { max-width: 200px; display: block; margin-top: 5px; }
</style>
</head>
<body>
<div id="messages"></div>
<form id="form">
<input type="text" id="text" placeholder="Say something" autocomplete="off" />
<input type="file" id="file" />
<select id="type">
  <option value="text">text</option>
  <option value="image">image</option>
  <option value="audio">audio</option>
  <option value="video">video</option>
  <option value="link">link</option>
</select>
<button>Send</button>
</form>
<script>
const ws = new WebSocket(`ws://${location.hostname}:8081`);
const form = document.getElementById('form');
const messages = document.getElementById('messages');
ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  const div = document.createElement('div');
  switch(msg.type){
    case 'text':
      div.textContent = msg.content;
      break;
    case 'image':
      const img = new Image();
      img.src = msg.content;
      div.appendChild(img);
      break;
    case 'audio':
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = msg.content;
      div.appendChild(audio);
      break;
    case 'video':
      const video = document.createElement('video');
      video.controls = true;
      video.src = msg.content;
      div.appendChild(video);
      break;
    case 'link':
      const a = document.createElement('a');
      a.href = msg.content;
      a.textContent = msg.content;
      a.target = '_blank';
      div.appendChild(a);
      break;
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
};
form.onsubmit = async (e) => {
  e.preventDefault();
  const type = document.getElementById('type').value;
  let content = document.getElementById('text').value;
  const fileInput = document.getElementById('file');
  if (fileInput.files[0]) {
    content = await toDataURL(fileInput.files[0]);
  }
  ws.send(JSON.stringify({type, content}));
  document.getElementById('text').value='';
  fileInput.value='';
};
function toDataURL(file){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}
</script>
</body>
</html>
